<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Jarvis Jr.</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="Jarvis Jr." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --abyss:#071333;
    --deep:#0d2356;
    --teal:#00d9e8;
    --lagoon:#37e6a0;
    --coral:#ff7a45;
    --sun:#ffd23f;
    --foam:#eafcff;
    --shark:#5fc8ff;
    --dino:#7be08a;
    --fish:#ffb05c;
    --monster:#c08bff;
    --whale:#6ea8ff;
    --turtle:#5fd6a8;
    --crab:#ff8f7a;
    --seahorse:#ffcf5c;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Nunito',system-ui,sans-serif;
    background:
      radial-gradient(120% 90% at 50% -10%, #14367a 0%, var(--deep) 38%, var(--abyss) 100%);
    color:var(--foam);
    overflow:hidden;
    height:100dvh;
    position:relative;
    user-select:none;
  }

  /* ambient ocean */
  .ambient{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .ray{position:absolute;top:-20%;width:18vw;height:140%;
    background:linear-gradient(180deg, rgba(120,220,255,.14), transparent 70%);
    filter:blur(8px);transform:rotate(8deg);animation:sway 11s ease-in-out infinite;}
  .ray.r2{left:30%;animation-delay:-3s;opacity:.7;}
  .ray.r3{left:62%;animation-delay:-6s;opacity:.6;}
  .ray.r1{left:6%;}
  @keyframes sway{0%,100%{transform:rotate(8deg) translateX(0);}50%{transform:rotate(8deg) translateX(30px);}}

  .bubble{position:absolute;bottom:-40px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.85), rgba(120,220,255,.25) 60%, transparent);
    animation:rise linear infinite;}
  @keyframes rise{
    0%{transform:translateY(0) translateX(0);opacity:0;}
    10%{opacity:.8;}
    90%{opacity:.6;}
    100%{transform:translateY(-115dvh) translateX(20px);opacity:0;}
  }
  .swimmer{position:absolute;font-size:30px;opacity:.18;animation:swim linear infinite;will-change:transform;}
  @keyframes swim{from{transform:translateX(-15vw) scaleX(1);}to{transform:translateX(115vw) scaleX(1);}}

  /* layout */
  .app{position:relative;z-index:2;height:100dvh;display:flex;flex-direction:column;
    max-width:760px;margin:0 auto;padding:10px 16px 18px;}

  .topbar{display:flex;align-items:center;justify-content:space-between;flex:0 0 auto;}
  .play{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;
    justify-content:center;gap:14px;}
  .brand{font-family:'Fredoka';font-weight:700;font-size:20px;letter-spacing:.5px;
    color:var(--foam);display:flex;align-items:center;gap:8px;}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--lagoon);
    box-shadow:0 0 12px var(--lagoon);animation:blink 2.4s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.35;}}

  .lang{display:flex;background:rgba(255,255,255,.08);border-radius:999px;padding:4px;
    border:1px solid rgba(255,255,255,.12);}
  .lang button{font-family:'Fredoka';font-weight:600;font-size:14px;color:var(--foam);
    background:transparent;border:none;border-radius:999px;padding:7px 16px;cursor:pointer;opacity:.6;}
  .lang button.on{background:var(--teal);color:#062033;opacity:1;}

  /* avatar */
  .stage{flex:0 0 auto;display:flex;justify-content:center;align-items:center;
    padding:14px 0 10px;position:relative;}
  .rings{position:absolute;width:210px;height:210px;border-radius:50%;
    border:3px solid var(--teal);opacity:0;}
  .listening .rings{animation:pulse 1.4s ease-out infinite;}
  .listening .rings.d{animation-delay:.5s;}
  @keyframes pulse{0%{transform:scale(.6);opacity:.7;}100%{transform:scale(1.25);opacity:0;}}

  .jarvis{width:172px;height:172px;cursor:pointer;animation:bob 3.4s ease-in-out infinite;
    filter:drop-shadow(0 14px 26px rgba(0,160,200,.35));}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-1.5deg);}50%{transform:translateY(-12px) rotate(1.5deg);}}
  .thinking .jarvis{animation:bob 3.4s ease-in-out infinite, wob .8s ease-in-out infinite;}
  @keyframes wob{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}

  .talking .mouth{animation:talk .26s ease-in-out infinite alternate;transform-origin:center;}
  @keyframes talk{from{transform:scaleY(.4);}to{transform:scaleY(1.15);}}

  /* moving creature parts */
  .anim{transform-box:fill-box;}
  .wagL{transform-box:fill-box;transform-origin:left center;animation:wag 1.1s ease-in-out infinite;}
  .wagFast{transform-box:fill-box;transform-origin:left center;animation:wag .7s ease-in-out infinite;}
  .wig{transform-box:fill-box;transform-origin:center bottom;animation:wig 1.6s ease-in-out infinite;}
  .neck{transform-box:fill-box;transform-origin:bottom right;animation:nod 2.6s ease-in-out infinite;}
  .tent{transform-box:fill-box;transform-origin:center top;animation:wiggle 1.4s ease-in-out infinite;}
  @keyframes wag{0%,100%{transform:rotate(-9deg);}50%{transform:rotate(11deg);}}
  @keyframes wig{0%,100%{transform:rotate(-7deg);}50%{transform:rotate(7deg);}}
  @keyframes nod{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}
  @keyframes wiggle{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(3px) rotate(4deg);}}

  /* speech bubble */
  .speech{margin:6px 4px 12px;background:rgba(255,255,255,.96);color:#0c2747;
    border-radius:26px;padding:20px 22px;min-height:96px;position:relative;
    box-shadow:0 12px 34px rgba(2,16,40,.45);display:flex;align-items:center;justify-content:center;}
  .speech::before{content:"";position:absolute;top:-14px;left:50%;transform:translateX(-50%);
    border-left:14px solid transparent;border-right:14px solid transparent;border-bottom:16px solid rgba(255,255,255,.96);}
  .speech p{font-family:'Nunito';font-weight:800;font-size:20px;line-height:1.45;text-align:center;}
  .speech.idle p{color:#5b7da6;font-weight:700;}
  .dots span{display:inline-block;width:12px;height:12px;margin:0 4px;border-radius:50%;
    background:var(--teal);animation:jump .9s ease-in-out infinite;}
  .dots span:nth-child(2){animation-delay:.15s;background:var(--coral);}
  .dots span:nth-child(3){animation-delay:.3s;background:var(--lagoon);}
  @keyframes jump{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
  .bounce{display:inline-block;font-size:46px;line-height:1;animation:jump .6s ease-in-out infinite;}

  /* creature buttons */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .crt{font-family:'Fredoka';font-weight:600;border:none;border-radius:20px;
    padding:12px 6px 10px;cursor:pointer;color:#06243a;display:flex;flex-direction:column;
    align-items:center;gap:4px;font-size:14px;line-height:1.12;text-align:center;
    overflow-wrap:anywhere;transition:transform .12s ease;
    box-shadow:0 6px 0 rgba(0,0,0,.22);}
  .crt:active{transform:translateY(5px);box-shadow:0 2px 0 rgba(0,0,0,.22);}
  .crt .ico{font-size:30px;line-height:1;}
  .crt.shark{background:var(--shark);}
  .crt.dino{background:var(--dino);}
  .crt.fish{background:var(--fish);}
  .crt.monster{background:var(--monster);}
  .crt.whale{background:var(--whale);}
  .crt.turtle{background:var(--turtle);}
  .crt.crab{background:var(--crab);}
  .crt.seahorse{background:var(--seahorse);}

  /* category buttons (home screen) */
  .grid.cats{grid-template-columns:repeat(2,1fr);gap:12px;}
  .cat{font-family:'Fredoka';font-weight:600;border:none;border-radius:22px;
    padding:18px 10px;cursor:pointer;color:#06243a;display:flex;flex-direction:column;
    align-items:center;gap:6px;font-size:15px;line-height:1.15;text-align:center;
    overflow-wrap:anywhere;transition:transform .12s ease;box-shadow:0 6px 0 rgba(0,0,0,.22);}
  .cat:active{transform:translateY(5px);box-shadow:0 2px 0 rgba(0,0,0,.22);}
  .cat .ico{font-size:34px;line-height:1;}
  /* category nav bar (shown only inside a category) */
  .navbar{display:none;align-items:center;gap:10px;margin-bottom:2px;}
  .navbar.on{display:flex;}
  .catback{font-family:'Fredoka';font-weight:700;font-size:15px;color:#062033;
    background:linear-gradient(180deg,var(--sun),var(--coral));border:none;border-radius:16px;
    padding:9px 15px;cursor:pointer;box-shadow:0 4px 0 #c8531f;display:flex;align-items:center;gap:5px;}
  .catback:active{transform:translateY(3px);box-shadow:0 1px 0 #c8531f;}
  .catback .arrow{font-size:19px;line-height:1;}
  .cattitle{font-family:'Fredoka';font-weight:700;font-size:18px;color:var(--foam);}

  .micbtn{width:100%;font-family:'Fredoka';font-weight:700;font-size:21px;color:#062033;
    background:linear-gradient(180deg,var(--sun),var(--coral));border:none;border-radius:24px;
    padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;
    box-shadow:0 7px 0 #c8531f;transition:transform .12s ease;}
  .micbtn:active{transform:translateY(5px);box-shadow:0 2px 0 #c8531f;}
  /* RED = mic off (offline) */
  .micbtn.off{background:linear-gradient(180deg,#ff6b6b,#e23b3b);box-shadow:0 7px 0 #a81f1f;color:#fff;}
  /* GREEN = mic on (online / listening) */
  .micbtn.ready{background:linear-gradient(180deg,#54e6a0,#1fbf72);box-shadow:0 7px 0 #128a50;color:#06301f;}
  .micbtn.ready.live{animation:micpulse 1.1s ease-in-out infinite;}
  .micbtn .micico{font-size:24px;}
  @keyframes micpulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
  .replies{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
    opacity:.35;pointer-events:none;transition:opacity .25s ease;}
  .replies.on{opacity:1;pointer-events:auto;}
  .rep{font-family:'Fredoka';font-weight:700;font-size:17px;border:none;border-radius:20px;
    padding:14px 6px 11px;cursor:pointer;color:#062033;display:flex;flex-direction:column;
    align-items:center;gap:3px;line-height:1.1;text-align:center;overflow-wrap:anywhere;
    transition:transform .12s ease;box-shadow:0 6px 0 rgba(0,0,0,.2);}
  .rep:active{transform:translateY(5px);box-shadow:0 1px 0 rgba(0,0,0,.2);}
  .rep .rico{font-size:26px;line-height:1;}
  .rep.yes{background:var(--lagoon);}
  .rep.more{background:var(--teal);}
  .rep.why{background:var(--sun);}
  .rep.wow{background:#ff9ec4;}
  .rep.next{background:#9ec7ff;}   /* soft blue  */
  .rep.no{background:#ffb38f;}     /* gentle peach */

  .hint{text-align:center;font-size:12.5px;color:rgba(234,252,255,.55);margin-top:9px;min-height:16px;}

  @media (max-height:680px){
    .jarvis{width:130px;height:130px;} .rings{width:160px;height:160px;}
    .speech{min-height:76px;padding:15px;} .speech p{font-size:18px;}
    .crt .ico{font-size:28px;} .crt{font-size:13px;}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001s !important;}
    .jarvis{animation:none;} .swimmer,.bubble,.ray{display:none;}
  }
  /* ---- big immersive creature view (Level A: enlarge + animate cartoon) ---- */
  .bigstage{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;
    background:radial-gradient(120% 90% at 50% 0%, #14367a 0%, var(--deep) 42%, var(--abyss) 100%);
    padding:14px 16px max(16px,env(safe-area-inset-bottom)) 16px;}
  .bigstage.show{display:flex;}
  .bigtop{display:flex;align-items:center;gap:12px;flex:0 0 auto;flex-wrap:wrap;}
  .micmini{margin-left:auto;font-family:'Fredoka';font-weight:700;font-size:16px;
    border:none;border-radius:18px;padding:11px 18px;cursor:pointer;white-space:nowrap;
    display:flex;align-items:center;gap:8px;transition:transform .12s ease;}
  .micmini:active{transform:translateY(4px) !important;}
  .micmini .micico{font-size:20px;}
  .micmini.off{background:linear-gradient(180deg,#ff6b6b,#e23b3b);box-shadow:0 5px 0 #a81f1f;color:#fff;}
  .micmini.ready{background:linear-gradient(180deg,#54e6a0,#1fbf72);box-shadow:0 5px 0 #128a50;color:#06301f;}
  .micmini.ready.live{animation:micpulse 1.1s ease-in-out infinite;}
  .backbtn{font-family:'Fredoka';font-weight:700;font-size:17px;color:#062033;
    background:linear-gradient(180deg,var(--sun),var(--coral));border:none;border-radius:18px;
    padding:11px 18px;cursor:pointer;box-shadow:0 5px 0 #c8531f;display:flex;align-items:center;gap:6px;}
  .backbtn:active{transform:translateY(4px);box-shadow:0 1px 0 #c8531f;}
  .backbtn .arrow{font-size:22px;line-height:1;}
  .bigname{font-family:'Fredoka';font-weight:700;font-size:22px;color:var(--foam);}
  .bigwrap{flex:1 1 auto;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .jarvisBig{width:min(62vmin,360px);height:min(62vmin,360px);cursor:pointer;
    animation:bobBig 3.4s ease-in-out infinite;
    filter:drop-shadow(0 22px 42px rgba(0,160,200,.45));}
  @keyframes bobBig{
    0%{transform:translate(-20px,0) rotate(-2.5deg);}
    50%{transform:translate(20px,-22px) rotate(2.5deg);}
    100%{transform:translate(-20px,0) rotate(-2.5deg);}}
  .thinking .jarvisBig{animation:bobBig 3.4s ease-in-out infinite, wob .8s ease-in-out infinite;}
  .bigspeech{flex:0 0 auto;background:rgba(255,255,255,.96);color:#0c2747;border-radius:26px;
    padding:18px 20px;min-height:84px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 12px 34px rgba(2,16,40,.45);margin:6px 2px 12px;}
  .bigspeech p{font-family:'Nunito';font-weight:800;font-size:21px;line-height:1.4;text-align:center;}
  .bigspeech.idle p{color:#5b7da6;font-weight:700;}
  @media (max-height:680px){
    .jarvisBig{width:min(44vmin,230px);height:min(44vmin,230px);}
    .bigspeech{min-height:62px;padding:13px;} .bigspeech p{font-size:18px;}
  }
  /* parent-facing diagnostic bar (only shows when a request fails) */
  .diag{position:fixed;left:8px;right:8px;bottom:6px;z-index:60;display:none;
    background:rgba(8,16,36,.94);color:#ffd2d2;font-family:'Nunito',sans-serif;font-size:12px;
    line-height:1.35;padding:9px 13px;border-radius:12px;border:1px solid rgba(255,120,120,.55);
    box-shadow:0 6px 20px rgba(0,0,0,.4);cursor:pointer;}
</style>
</head>
<body>
<div class="ambient" id="ambient">
  <div class="ray r1"></div><div class="ray r2"></div><div class="ray r3"></div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <div class="brand"><span class="dot"></span> Jarvis Jr.</div>
    <div class="lang">
      <button id="thBtn" onclick="setLang('th')">ไทย</button>
      <button id="enBtn" class="on" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div class="play">
    <div class="stage" id="stage">
      <div class="rings"></div>
      <div class="rings d"></div>
      <div id="avatarSlot"></div>
    </div>

    <div class="speech idle" id="speech">
      <p id="answer"></p>
    </div>

    <div class="navbar" id="navbar">
      <button class="catback" onclick="showHome()"><span class="arrow">‹</span><span id="catBackLbl"></span></button>
      <span class="cattitle" id="catTitle"></span>
    </div>

    <div class="grid cats" id="grid"></div>

    <button class="micbtn" id="micBtn" onclick="micTap()">
      <span class="micico">🎤</span><span id="micLbl">Talk to Jarvis</span>
    </button>

    <div class="replies" id="replies">
      <button class="rep yes"  onclick="reply('yes')"><span class="rico">🎉</span><span data-rep="yes">Yes!</span></button>
      <button class="rep more" onclick="reply('more')"><span class="rico">🔊</span><span data-rep="more">More!</span></button>
      <button class="rep next" onclick="reply('next')"><span class="rico">⏭️</span><span data-rep="next">Next</span></button>
      <button class="rep why"  onclick="reply('why')"><span class="rico">🤔</span><span data-rep="why">Why?</span></button>
      <button class="rep wow"  onclick="reply('wow')"><span class="rico">😍</span><span data-rep="wow">Wow!</span></button>
      <button class="rep no"   onclick="reply('no')"><span class="rico">🙅</span><span data-rep="no">No</span></button>
    </div>
    <div class="hint" id="hint"></div>
  </div>
</div>

<!-- BIG immersive creature view (Level A) -->
<div class="bigstage" id="bigStage">
  <div class="bigtop">
    <button class="backbtn" onclick="closeBig()"><span class="arrow">‹</span><span data-rep="back">Back</span></button>
    <div class="bigname" id="bigName"></div>
    <button class="micmini off" id="bigMic" onclick="micTap()">
      <span class="micico">🎤</span><span id="bigMicLbl"></span>
    </button>
  </div>
  <div class="bigwrap" id="bigAvatarWrap">
    <div id="bigAvatarSlot"></div>
  </div>
  <div class="bigspeech idle" id="bigSpeech"><p id="bigAnswer"></p></div>
  <div class="replies" id="bigReplies">
    <button class="rep yes"  onclick="reply('yes')"><span class="rico">🎉</span><span data-rep="yes">Yes!</span></button>
    <button class="rep more" onclick="reply('more')"><span class="rico">🔊</span><span data-rep="more">More!</span></button>
    <button class="rep next" onclick="reply('next')"><span class="rico">⏭️</span><span data-rep="next">Next</span></button>
    <button class="rep why"  onclick="reply('why')"><span class="rico">🤔</span><span data-rep="why">Why?</span></button>
    <button class="rep wow"  onclick="reply('wow')"><span class="rico">😍</span><span data-rep="wow">Wow!</span></button>
    <button class="rep no"   onclick="reply('no')"><span class="rico">🙅</span><span data-rep="no">No</span></button>
  </div>
</div>

<script>
/* ---------------- state + i18n ---------------- */
var lang = 'en';
var busy = false;
var reqId = 0;          // identifies the latest request so stale answers are ignored
var curUtter = null;    // the utterance Jarvis is currently speaking

var T = {
  th:{
    shark:'ฉลาม', dino:'ไดโนเสาร์', fish:'ปลา', monster:'มอนสเตอร์',
    whale:'วาฬ', turtle:'เต่า', crab:'ปู', seahorse:'แมวน้ำ',
    yes:'ใช่!', more:'อีก!', why:'ทำไม?', wow:'ว้าว!', no:'ไม่', next:'ต่อไป', back:'กลับ', cats:'หมวดทั้งหมด',
    idle:'เลือกหมวด แล้วแตะตัวสัตว์ที่อยากรู้ คุยกับ Jarvis ได้เลย!',
    thinking:'Jarvis กำลังคิด...',
    chathint:'แตะปุ่มสีๆ เพื่อคุยกับ Jarvis ต่อ!',
    oops:'อุ๊ปส์! สมองหุ่นยนต์มีฟองอากาศ ลองใหม่อีกครั้งนะ!',
    langName:'Thai (ภาษาไทย)',
    rYes:'ใช่! หนูชอบ!', rMore:'เล่าอีก!', rWhy:'ทำไมล่ะ?', rWow:'ว้าว เจ๋งมาก!', rNo:'อืม ไม่ชอบอันนี้', rNext:'ขออันอื่นอีก!',
    fill:{shark:'ว้าว ฉลาม!', dino:'เย้ ไดโนเสาร์!', fish:'ปลาว่ายน้ำ!', monster:'ปลาหมึกน่ารัก!', whale:'วาฬตัวใหญ่!', turtle:'เต่าน้อย!', crab:'ปูหนีบ!', seahorse:'แมวน้ำน่ารัก!', more:'ได้เลย!'},
    talk:'พูดกับ Jarvis', stop:'หยุด',
    tapwake:'แตะเพื่อเปิดไมค์',
    talktap:'แตะแล้วพูด 🎤', listening:'กำลังฟัง… 👂',
    sayhey:'เปิดไมค์แล้ว! พูดได้เลย เช่น "ฉลาม" หรือ "ช้าง"',
    sayheybtn:'พูด "Hey Jarvis"',
    hi:'สวัสดีจ้า!',
    bye:'บ๊ายบาย แล้วเจอกันนะ!',
    awaketext:'สวัสดีจ้า! ถามอะไร Jarvis ก็ได้เลยนะ 🐠',
    sleeptext:'Jarvis ไปนอนแล้ว 💤 แตะแถบเพื่อปลุกอีกครั้งนะ',
    listening:'พูดได้เลย Jarvis กำลังฟังอยู่...',
    nomic:'เบราว์เซอร์นี้ใช้ไมค์ไม่ได้ ลองเปิดด้วย Safari นะ',
    micdenied:'แตะอนุญาตให้ใช้ไมโครโฟนก่อนนะคะ'
  },
  en:{

/* ---------------- UI helpers ---------------- */
function setLang(l){
  lang=l;
  document.getElementById('thBtn').classList.toggle('on', l==='th');
  document.getElementById('enBtn').classList.toggle('on', l==='en');
  document.documentElement.lang = l;
  document.querySelectorAll('[data-rep]').forEach(function(el){
    var k=el.getAttribute('data-rep');
    if(T[l][k]!==undefined) el.textContent=T[l][k];
  });
  document.getElementById('catBackLbl').textContent = T[l].cats;
  buildGrid();        // re-label category / animal buttons in the new language
  updateCatTitle();
  updateBigName();
  if(typeof setMicVisual==='function') setMicVisual();
  if(!busy) showIdle();
}

/* ---------------- categories + animal grids ---------------- */
var view = 'home';     // 'home' = category buttons, 'cat' = animals in a category
var currentCat = null;
function buildGrid(){
  var g=document.getElementById('grid');
  if(!g) return;
  g.innerHTML='';
  if(view==='home'){
    g.className='grid cats';
    document.getElementById('navbar').classList.remove('on');
    CATEGORIES.forEach(function(c){
      var b=document.createElement('button');
      b.className='cat';
      b.style.background=c.color;
      b.onclick=function(){ openCategory(c.key); };
      b.innerHTML='<span class="ico">'+c.emoji+'</span><span>'+(lang==='th'?c.th:c.en)+'</span>';
      g.appendChild(b);
    });
  }else{
    g.className='grid';
    document.getElementById('navbar').classList.add('on');
    var cat=catByKey(currentCat);
    if(cat) cat.animals.forEach(function(k,i){
      var a=ANIMALS[k]; if(!a) return;
      var b=document.createElement('button');
      b.className='crt';
      b.style.background=BTN_COLORS[i % BTN_COLORS.length];
      b.onclick=function(){ askAnimal(k); };
      b.innerHTML='<span class="ico">'+a.emoji+'</span><span>'+(lang==='th'?a.th:a.en)+'</span>';
      g.appendChild(b);
    });
  }
}
function catByKey(k){ for(var i=0;i<CATEGORIES.length;i++){ if(CATEGORIES[i].key===k) return CATEGORIES[i]; } return null; }
function updateCatTitle(){
  var t=document.getElementById('catTitle'); if(!t) return;
  var cat=catByKey(currentCat);
  t.textContent = (view==='cat' && cat) ? (lang==='th'?cat.th:cat.en) : '';
}
function showHome(){
  view='home'; currentCat=null;
  buildGrid(); updateCatTitle();
}
function openCategory(key){
  view='cat'; currentCat=key;
  buildGrid(); updateCatTitle();
}

  ['stage','bigAvatarWrap'].forEach(function(id){

    el.classList.remove('listening','thinking','talking');
    if(s) el.classList.add(s);

}

  setAnswerText(text);

}

/* ---------------- speech output ---------------- */
function speak(text){
  try{
    if(!('speechSynthesis' in window)){ setState(null); busy=false; return; }
    var u=new SpeechSynthesisUtterance(text);
    u.lang = (lang==='th')?'th-TH':'en-US';
    u.rate = (lang==='th')?0.92:0.88;
    u.pitch = 1.18;
    var voices=window.speechSynthesis.getVoices();
    var want = voices.filter(function(v){ return v.lang && v.lang.toLowerCase().indexOf(lang==='th'?'th':'en')===0; });
    if(want.length){
      var nice = want.find(function(v){return /kanya|google|samantha|nicky|aaron/i.test(v.name);});
      u.voice = nice||want[0];
    }
    jarvisSpeaking = true;                 // set now, don't wait for onstart (it can be flaky)
    if(speakWatchdog) clearTimeout(speakWatchdog);
    var est = Math.min(15000, 2500 + text.length * 90);
    speakWatchdog = setTimeout(function(){   // safety: never let the mic stay "deaf" if onend doesn't fire
      jarvisSpeaking=false; muteUntil=Date.now()+300; setState(null); busy=false;
    }, est);
    u.onstart=function(){ jarvisSpeaking=true; setState('talking'); };
    u.onend=function(){ if(speakWatchdog) clearTimeout(speakWatchdog); jarvisSpeaking=false; muteUntil=Date.now()+1000; setState(null); busy=false; };
    u.onerror=function(){ if(speakWatchdog) clearTimeout(speakWatchdog); jarvisSpeaking=false; muteUntil=Date.now()+1000; setState(null); busy=false; };
    curUtter=u;
    window.speechSynthesis.speak(u);
  }catch(e){ jarvisSpeaking=false; setState(null); busy=false; }
}

// Stop whatever Jarvis is SAYING right now (used when a child taps something new).
function stopJarvis(){
  reqId++;  // any answer still loading from before is now ignored
  jarvisSpeaking=false;
  if(speakWatchdog){ clearTimeout(speakWatchdog); speakWatchdog=null; }
  if(curUtter){ curUtter.onstart=null; curUtter.onend=null; curUtter.onerror=null; curUtter=null; }
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
  busy=false; setState(null);
  if(micOn) setMicVisual();   // keep mic showing its on/off colour
}
// warm up voices list on iOS
if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged=function(){}; }

// quick excited word spoken the instant a button is tapped (no API wait)
function sayFiller(text){
  try{
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang=(lang==='th')?'th-TH':'en-US';
    u.rate=0.98; u.pitch=1.3;
    var voices=window.speechSynthesis.getVoices();
    var want=voices.filter(function(v){return v.lang && v.lang.toLowerCase().indexOf(lang==='th'?'th':'en')===0;});
    if(want.length){var nice=want.find(function(v){return /kanya|google|samantha|nicky|aaron/i.test(v.name);});u.voice=nice||want[0];}
    jarvisSpeaking=true;
    if(speakWatchdog) clearTimeout(speakWatchdog);
    speakWatchdog=setTimeout(function(){ jarvisSpeaking=false; muteUntil=Date.now()+200; }, 3500);
    u.onstart=function(){ jarvisSpeaking=true; };
    u.onend=function(){ if(speakWatchdog) clearTimeout(speakWatchdog); jarvisSpeaking=false; muteUntil=Date.now()+700; };
    u.onerror=function(){ if(speakWatchdog) clearTimeout(speakWatchdog); jarvisSpeaking=false; muteUntil=Date.now()+700; };
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function tapJarvis(){
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
  jarvisSpeaking=false; muteUntil=Date.now()+500;
  setState(null); busy=false;
  if(convo.length===0) showIdle();
}

/* ---------------- Jarvis brain (via secure Netlify function) ---------------- */
var convo = [];      // running chat history sent to the server
var topicName = '';  // current animal we are talking about

function callJarvis(userText){
  var myId = ++reqId;          // mark this as the newest request
  setThinking();
  if(convo.length && convo[convo.length-1].role==='user'){ convo.pop(); } // drop leftover from an interrupted turn
  convo.push({role:'user', content:userText});
  if(convo.length>10) convo = convo.slice(-10);
  fetch("/.netlify/functions/jarvis",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ messages: convo, lang: lang })
  })
  .then(function(r){
    var status=r.status;
    return r.text().then(function(raw){
      var d=null; try{ d=JSON.parse(raw); }catch(e){}
      return { ok:r.ok, status:status, d:d, raw:raw };
    });
  })
  .then(function(res){
    if(myId!==reqId) return;   // a newer tap replaced this one — ignore the old answer
    var text = (res.d && res.d.text) ? String(res.d.text).trim() : '';
    if(res.ok && text){
      convo.push({role:'assistant', content:text});
      showAnswer(text);
      speak(text);
      return;
    }
    // something went wrong — show friendly Oops to the child, real reason to the parent
    busy=false; setState(null);
    showAnswer(T[lang].oops);
    speak(T[lang].oops);
    var reason;
    if(res.d && res.d.error){ reason = res.d.error; }
    else if(res.status===404){ reason = 'Function not found (404) — the Jarvis function did not deploy. Re-upload the zip on its own.'; }
    else if(!res.d){ reason = 'Server replied with status '+res.status+' (not JSON): '+String(res.raw).slice(0,120); }
    else { reason = 'No answer from Jarvis (status '+res.status+').'; }
    showDiag('Server says: '+reason);
  })
  .catch(function(err){
    if(myId!==reqId) return;
    busy=false; setState(null);
    showAnswer(T[lang].oops);
    speak(T[lang].oops);
    showDiag('Could not reach the Jarvis function: '+String(err && err.message ? err.message : err));
  });
}

var currentDanger = false;
function askAnimal(key){
  var a = ANIMALS[key]; if(!a) return;
  stopJarvis();                     // interrupt anything in progress, instantly
  renderAvatar(key);                // the talking character becomes this animal
  openBig();                        // open the big immersive creature view
  currentEmoji = a.emoji || '🐟';
  sayFiller(lang==='th' ? a.fillTh : a.fillEn);   // instant happy sound, no waiting
  convo = [];                       // start a fresh chat about this animal
  topicName = a.topic;
  currentDanger = !!a.danger;
  var angle=angles[Math.floor(Math.random()*angles.length)];
  var safety = a.danger
    ? " IMPORTANT: this animal can be dangerous to a little child. In a calm, happy, gentle way (never scary) remind the child that we only LOOK from far away, we NEVER touch it, and we always tell Mommy or Daddy if we see one."
    : "";
  var prompt = "Let's talk about " + topicName + ". Tell me one " + angle
    + " fun thing about them, in " + T[lang].langName + ", for a 3 year old. Keep it tiny and playful." + safety;
  callJarvis(prompt);
}

// Child taps a colored button to chat back; we send it as their reply.
function reply(kind){
  if(convo.length===0) return;      // nothing to reply to yet
  stopJarvis();                     // interrupt, then continue the chat
  var map = { yes:T[lang].rYes, more:T[lang].rMore, why:T[lang].rWhy, wow:T[lang].rWow, no:T[lang].rNo, next:T[lang].rNext };
  var said = map[kind] || T[lang].rMore;
  var animal = (topicName||'the animal');
  var extra = '';
  if(kind==='no')   extra = ' The child did not like that one. Cheerfully say something like "okay!" and tell a completely DIFFERENT, brand-new fun thing about ' + animal + '.';
  if(kind==='next') extra = ' Tell a completely DIFFERENT, brand-new fun thing about ' + animal + ' — not the same fact as before.';
  if(currentDanger) extra += ' Remember to gently remind the child, in a calm happy way, that we only look and never touch this one, and tell a grown-up if we see it.';
  var prompt = said + "  (Keep talking about " + animal
    + " in " + T[lang].langName + ", tiny and playful for a 3 year old, and ask me a little question back." + extra + ")";
  callJarvis(prompt);
}

/* ---------------- microphone: hands-free "Hey Jarvis" ---------------- */
var recog = null;          // the speech recognition engine
var listening = false;     // are we actively listening right now?
var micOn = false;         // has the parent turned the always-listening mode ON?
var awake = false;         // is Jarvis currently "awake" and answering?
var jarvisSpeaking = false; // true while Jarvis is talking — mic must NOT listen to his own voice
var muteUntil = 0;          // ignore anything heard until this time (covers the echo tail)
var speakWatchdog = null;   // safety timer so jarvisSpeaking never gets stuck on
// Only iPad/iPhone truly can't do continuous "Hey Jarvis" listening (Apple blocks it) -> tap-to-talk there.
// Every other device (computer, Mac) keeps the always-on hands-free mode.
var USE_TAPTALK = (function(){
  var ua = navigator.userAgent || '';
  var iDevice = /iPad|iPhone|iPod/.test(ua);
  var iPadOS = (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  return iDevice || iPadOS;
})();
var restartTimer = null;

// words that WAKE Jarvis up (open ears / start a chat)
var WAKE_WORDS = [
  'hey jarvis','hi jarvis','jarvis wake up','wake up jarvis',
  'good morning jarvis','good afternoon jarvis','good evening jarvis',
  'morning jarvis','wake up','good morning','good afternoon','good evening','jarvis'
];
// words that put Jarvis to SLEEP (stop listening)
var SLEEP_WORDS = [
  'bye jarvis','bye bye jarvis','goodbye jarvis','good night',
  'goodnight','go to sleep','see you tomorrow','stop'
];

function textHasAny(text, list){
  text = ' ' + text.toLowerCase().replace(/[.,!?]/g,'') + ' ';
  for(var i=0;i<list.length;i++){
    if(text.indexOf(list[i])!==-1) return list[i];
  }
  return null;
}
// remove the wake word from the front so the rest can be a real question
function stripWake(text, hit){
  return text.toLowerCase().replace(hit,'').replace(/[.,!?]/g,'').trim();
}

function setMicVisual(){
  // keep BOTH mic buttons in sync: main page bar + big-view pill
  var btns=[ {b:'micBtn', l:'micLbl'}, {b:'bigMic', l:'bigMicLbl'} ];
  for(var i=0;i<btns.length;i++){
    var m=document.getElementById(btns[i].b);
    if(!m) continue;
    var lbl=document.getElementById(btns[i].l);
    m.classList.remove('live','off','ready');
    if(USE_TAPTALK){
      // tap-to-talk: green when listening, otherwise a ready "tap to talk" state
      if(listening){ m.classList.add('ready','live'); if(lbl) lbl.textContent=T[lang].listening; }
      else{ m.classList.add('ready'); if(lbl) lbl.textContent=T[lang].talktap; }
    }else{
      // hands-free: GREEN = on/listening, RED = off
      if(micOn){
        m.classList.add('ready');
        if(lbl) lbl.textContent = T[lang].talk;
        if(listening) m.classList.add('live');
      }else{
        m.classList.add('off');
        if(lbl) lbl.textContent = T[lang].tapwake;
      }
    }
  }
}

// Parent/child taps the bar.
function micTap(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ flashHint(T[lang].nomic); return; }
  if(USE_TAPTALK){ pushToTalk(); return; }            // iPad/iPhone: one tap = one phrase
  if(micOn){ turnMicOff(); } else { turnMicOn(); } // computer: toggle hands-free
}

// iOS tap-to-talk: listen for a single phrase (must start inside the tap gesture)
function pushToTalk(){
  if(listening){ try{ if(recog) recog.stop(); }catch(e){} return; }  // tap again to cancel
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ showDiag('This browser has no SpeechRecognition. Use Safari (not a Home-Screen app) or Chrome.'); flashHint(T[lang].nomic); return; }
  awake = true;                       // a tap means "I want to talk now"
  muteUntil = 0;                      // deliberate tap: never ignore the child
  if(jarvisSpeaking){ try{ window.speechSynthesis.cancel(); }catch(e){} jarvisSpeaking=false; }
  var heardSomething = false;
  try{
    recog = new SR();
    recog.lang = (lang==='th') ? 'th-TH' : 'en-US';
    recog.interimResults = false;
    recog.continuous = false;         // iOS: one phrase per session
    recog.maxAlternatives = 1;
    recog.onstart = function(){ listening=true; setState('listening'); setMicVisual(); };
    recog.onresult = function(e){
      var said='';
      for(var i=0;i<e.results.length;i++){ if(e.results[i].isFinal) said += e.results[i][0].transcript + ' '; }
      said = said.trim();
      if(said){ heardSomething=true; showDiag('Heard: "'+said+'"'); handleHeard(said); }
    };
    recog.onerror = function(ev){
      var er = ev && ev.error ? ev.error : 'unknown';
      if(er==='not-allowed' || er==='service-not-allowed'){
        showDiag('Mic blocked ('+er+'). Allow the microphone in Safari settings. (Voice does NOT work in a Home-Screen / saved app — open in Safari itself.)');
        flashHint(T[lang].micdenied);
      } else if(er==='no-speech'){
        showDiag('No speech heard. Tap, wait 1 second, then speak close to the iPad.');
      } else if(er==='language-not-supported'){
        showDiag('Language '+recog.lang+' not supported for voice on this device. Try switching the EN/ไทย toggle.');
      } else {
        showDiag('Mic error: '+er+' (listening in '+recog.lang+')');
      }
    };
    recog.onend = function(){
      listening=false; recog=null; setMicVisual();
      if(!heardSomething) showDiag('Stopped listening, caught no words ('+(lang==='th'?'th-TH':'en-US')+'). Tap, wait a moment, then speak.');
    };
    recog.start();
  }catch(e){ listening=false; setMicVisual(); showDiag('Could not start the mic: '+String(e&&e.message?e.message:e)); }
}

function turnMicOn(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ flashHint(T[lang].nomic); return; }
  micOn = true;
  awake = true;          // turning the mic on means "I'm ready to talk" — no need to say "Hey Jarvis" first
  setMicVisual();
  flashHint(T[lang].sayhey);
  startRecog();
}

function turnMicOff(){
  micOn = false; awake = false;
  if(restartTimer){ clearTimeout(restartTimer); restartTimer=null; }
  try{ if(recog){ recog.onend=null; recog.stop(); } }catch(e){}
  recog=null; listening=false;
  setMicVisual();
  if(!busy && convo.length===0) showIdle();
}

// Stop the always-on mic from hearing Jarvis's OWN voice (prevents the talk-forever loop)
function pauseListening(){
  if(restartTimer){ clearTimeout(restartTimer); restartTimer=null; }
  try{ if(recog){ recog.onend=null; recog.stop(); } }catch(e){}
  recog=null; listening=false; setMicVisual();
}
function resumeListening(){
  // only the hands-free (desktop) mode auto-listens; tap-to-talk waits for a tap
  if(micOn && !USE_TAPTALK && !jarvisSpeaking){
    if(restartTimer) clearTimeout(restartTimer);
    restartTimer = setTimeout(startRecog, 300);
  }
}

function startRecog(){
  if(!micOn) return;
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ return; }
  try{
    recog = new SR();
    recog.lang = (lang==='th') ? 'th-TH' : 'en-US';
    recog.interimResults = false;
    recog.continuous = true;       // keep listening; we restart if the browser cuts it
    recog.maxAlternatives = 1;

    recog.onstart = function(){
      listening = true;
      setState('listening');
      setMicVisual();
    };
    recog.onresult = function(e){
      var said='';
      for(var i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) said += e.results[i][0].transcript + ' ';
      }
      said = said.trim();
      if(!said) return;
      showDiag('Heard: "'+said+'"');
      handleHeard(said);
    };
    recog.onerror = function(ev){
      var er = ev && ev.error ? ev.error : 'unknown';
      if(er==='not-allowed' || er==='service-not-allowed'){
        showDiag('Mic blocked ('+er+'). Allow the microphone for this site.');
        flashHint(T[lang].micdenied);
        turnMicOff();
      } else if(er!=='no-speech' && er!=='aborted'){
        showDiag('Mic: '+er+' (listening in '+recog.lang+')');
      }
      // no-speech / aborted: let onend restart us
    };
    recog.onend = function(){
      listening=false;
      setMicVisual();
      // the browser stops listening after silence — wake it back up if still ON
      if(micOn){
        if(restartTimer) clearTimeout(restartTimer);
        restartTimer = setTimeout(startRecog, 350);
      }
    };
    recog.start();
  }catch(e){
    // some browsers throw if start() is called too fast; retry shortly
    if(micOn){ if(restartTimer) clearTimeout(restartTimer); restartTimer=setTimeout(startRecog,500); }
  }
}

// Spoken words that send Jarvis back to the home (category) screen
var HOME_WORDS = ['go home','home','main menu','start over','go back home','all animals',
  'หน้าหลัก','หน้าแรก','กลับบ้าน','กลับหน้าแรก','เมนูหลัก','กลับไปหน้าแรก'];
function matchHome(t){
  t = ' ' + t.toLowerCase().replace(/[.,!?]/g,'') + ' ';
  for(var i=0;i<HOME_WORDS.length;i++){
    var w=HOME_WORDS[i];
    // English words need spaces around them; Thai has no spaces so match anywhere
    if(/[a-z]/.test(w)){ if(t.indexOf(' '+w+' ')!==-1) return true; }
    else { if(t.indexOf(w)!==-1) return true; }
  }
  return false;
}
function goHome(){
  stopJarvis();
  closeBig();      // leave the big creature view if open
  showHome();      // back to the category buttons
  sayFiller(lang==='th' ? 'ไปหน้าแรกกัน!' : 'Back home!');
}

// Spoken words that act exactly like tapping a colored reply button
var REPLY_WORDS = {
  yes:  ['yes','yeah','yep','yay','ใช่','ชอบ','เอา'],
  no:   ['no','nope','ไม่','ไม่ชอบ','ไม่เอา'],
  more: ['more','again','more please','อีก','เล่าอีก','เอาอีก'],
  next: ['next','another','ต่อไป','ถัดไป','อันอื่น','อื่น'],
  why:  ['why','how come','ทำไม','เพราะอะไร'],
  wow:  ['wow','cool','awesome','ว้าว','เจ๋ง','สุดยอด']
};
function matchReply(t){
  t = ' ' + t.toLowerCase().replace(/[.,!?]/g,'') + ' ';
  for(var kind in REPLY_WORDS){
    var arr=REPLY_WORDS[kind];
    for(var i=0;i<arr.length;i++){ if(t.indexOf(' '+arr[i]+' ')!==-1) return kind; }
  }
  return null;
}
// Spoken animal names that open that animal (built from the ANIMALS registry + a few nicknames)
var ANIMAL_SAY = {};
(function(){
  var syn = {
    monster:['octopus','squid','kraken','ปลาหมึก','หมึก'],
    seahorse:['seal','sea lion','สิงโตทะเล'],
    dino:['dinosaur','t rex','ไดโน'],
    crocodile:['croc','alligator'],
    jellyfish:['jelly']
  };
  for(var k in ANIMALS){
    var a=ANIMALS[k]; var words=[k];
    if(a.th) words.push(a.th);
    if(a.en){ words.push(a.en.toLowerCase()); words.push(a.en.toLowerCase().replace(/s$/,'')); }
    if(syn[k]) words=words.concat(syn[k]);
    ANIMAL_SAY[k]=words;
  }
})();
function matchAnimal(t){
  t = ' ' + t.toLowerCase().replace(/[.,!?]/g,'') + ' ';
  for(var k in ANIMAL_SAY){
    var arr=ANIMAL_SAY[k];
    for(var i=0;i<arr.length;i++){
      var w=(''+arr[i]).toLowerCase().trim(); if(!w) continue;
      if(t.indexOf(w)!==-1) return k;
    }
  }
  return null;
}
// Route a spoken phrase: home -> reply button -> animal -> free question
function routeSpeech(said){
  if(matchHome(said)){ goHome(); return; }        // "go home", "หน้าแรก"
  var rk = matchReply(said);
  if(rk && convo.length){ reply(rk); return; }   // "yes", "more", "ทำไม" etc.
  var ak = matchAnimal(said);
  if(ak){ askAnimal(ak); return; }                // "shark", "หมา", "elephant" etc.
  askHeard(said);                                 // anything else -> ask Jarvis
}

// Decide what to do with whatever the child said.
function handleHeard(said){
  if(jarvisSpeaking || Date.now() < muteUntil) return;   // ignore Jarvis's own voice + its echo tail
  // 1) sleep words always win — Jarvis says bye and turns off
  var sleepHit = textHasAny(said, SLEEP_WORDS);
  if(sleepHit){
    sayFiller(T[lang].bye);
    awake=false;
    turnMicOff();
    showAnswer(T[lang].sleeptext);
    return;
  }
  // 2) wake words — Jarvis wakes up (and acts on the rest of the sentence if any)
  var wakeHit = textHasAny(said, WAKE_WORDS);
  if(wakeHit){
    awake = true;
    var rest = stripWake(said, wakeHit);
    if(rest.length>1){
      routeSpeech(rest);          // "Hey Jarvis, sharks" / "Jarvis, more"
    }else{
      sayFiller(T[lang].hi);      // they just said "Hey Jarvis"
      showAnswer(T[lang].awaketext);
    }
    return;
  }
  // 3) no wake/sleep word: only act if already awake
  if(awake){
    routeSpeech(said);
  }
  // if asleep and no wake word, we quietly ignore (kids chatting in the room)
}

// Send a real spoken question to Jarvis
function askHeard(said){
  var prompt = said + "  (A little child said this out loud. Answer in " + T[lang].langName
    + ", tiny and playful for a 3 year old, and ask a little question back.)";
  callJarvis(said.length ? prompt : (T[lang].hi));
}

function flashHint(msg){
  var h=document.getElementById('hint'); h.textContent=msg;
  setTimeout(function(){ if(h.textContent===msg) h.textContent=''; }, 4000);
}
// Parent-facing: show the real server error (stays ~25s, tap to dismiss)
function showDiag(msg){
  var d=document.getElementById('diag'); if(!d) return;
  d.textContent='🔧 '+msg+'  —  (tap to close)';
  d.style.display='block';
  if(d._t) clearTimeout(d._t);
  d._t=setTimeout(function(){ d.style.display='none'; }, 25000);
}

/* ---------------- start ---------------- */
renderAvatar('robot');
showHome();        // show the learning-category buttons first
setLang('en');
setMicVisual();   // start with the bar RED (mic off) until a parent taps it
</script><div id="diag" class="diag" onclick="this.style.display='none'"></div>
