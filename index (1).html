<!doctype html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Jarvis Jr.</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="Jarvis Jr." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:'Nunito',sans-serif;overflow:hidden;background:#04122e;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;
    background:radial-gradient(120% 80% at 50% -10%, #1a4f9e 0%, #0d2d6e 45%, #071a3f 100%);}
  .ray{position:absolute;top:-10%;width:120px;height:130%;background:linear-gradient(180deg,rgba(120,200,255,.16),rgba(120,200,255,0));transform:rotate(8deg);filter:blur(10px);animation:sway 9s ease-in-out infinite;pointer-events:none;}
  .ray.r2{left:40%;animation-delay:-3s;opacity:.7;} .ray.r3{left:72%;animation-delay:-6s;opacity:.5;}
  @keyframes sway{0%,100%{transform:rotate(8deg) translateX(0);}50%{transform:rotate(8deg) translateX(22px);}}
  .bubble{position:absolute;bottom:-40px;border-radius:50%;pointer-events:none;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.8),rgba(255,255,255,.16) 60%,rgba(255,255,255,0));animation:rise linear infinite;}
  @keyframes rise{0%{transform:translateY(0) scale(.8);opacity:0;}10%{opacity:.7;}100%{transform:translateY(-115vh) scale(1.1);opacity:0;}}

  .top{position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:16px 18px 4px;}
  .logo{font-family:'Fredoka';font-weight:700;color:#bfe6ff;font-size:18px;display:flex;align-items:center;gap:8px;}
  .dot{width:9px;height:9px;border-radius:50%;background:#5fd0a8;box-shadow:0 0 10px #5fd0a8;}
  .lang{display:flex;background:rgba(255,255,255,.12);border-radius:22px;overflow:hidden;}
  .lang button{font-family:'Fredoka';font-weight:600;font-size:14px;border:none;background:transparent;color:#bfe6ff;padding:7px 16px;cursor:pointer;}
  .lang button.on{background:#4ac4e6;color:#04243a;}

  .stage{position:relative;z-index:2;flex:1;display:flex;align-items:center;justify-content:center;min-height:0;}
  .jarvis{width:min(52vmin,220px);height:min(52vmin,220px);transition:all .5s ease;will-change:transform;animation:bob 3.8s ease-in-out infinite;}
  .jarvis.buddy{position:absolute;left:16px;bottom:8px;width:78px;height:78px;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-1.5deg);}50%{transform:translateY(-12px) rotate(1.5deg);}}
  .jPupil{transform-origin:center;animation:blink 4.6s infinite;}
  @keyframes blink{0%,92%,100%{transform:scaleY(1);}95%{transform:scaleY(.1);}}

  .creature{position:absolute;width:min(74vw,330px);height:min(74vw,330px);opacity:0;transform:translateX(70px) scale(.7);
    transition:opacity .45s ease, transform .6s cubic-bezier(.2,1.3,.4,1);display:flex;align-items:center;justify-content:center;}
  .creature.show{opacity:1;transform:translateX(0) scale(1);}
  .creature.show .art{animation:bob 3.3s ease-in-out infinite;}
  .art{width:100%;height:100%;}
  .bigemoji{font-size:min(46vw,210px);line-height:1;filter:drop-shadow(0 16px 26px rgba(0,0,0,.4));}
  .creature.show .bigemoji{animation:bob 3.3s ease-in-out infinite;}
  .talking .mouth{animation:talk .26s ease-in-out infinite alternate;transform-origin:center;}
  @keyframes talk{from{transform:scaleY(.45);}to{transform:scaleY(1.15);}}
  .wagL,.wagFast{transform-box:fill-box;transform-origin:left center;animation:wag 1.1s ease-in-out infinite;}
  .wagFast{animation-duration:.7s;}
  @keyframes wag{0%,100%{transform:rotate(-9deg);}50%{transform:rotate(11deg);}}

  .speech{position:relative;z-index:4;margin:0 16px;background:rgba(255,255,255,.97);color:#0c2747;border-radius:24px;
    padding:16px 18px;min-height:64px;max-height:30vh;overflow-y:auto;display:flex;align-items:center;justify-content:center;text-align:center;
    box-shadow:0 12px 30px rgba(2,16,40,.45);}
  .speech::before{content:"";position:absolute;top:-13px;left:50%;transform:translateX(-50%);border-left:13px solid transparent;border-right:13px solid transparent;border-bottom:15px solid rgba(255,255,255,.97);}
  .speech p{font-family:'Fredoka';font-weight:600;font-size:20px;line-height:1.35;}
  .speech.idle p{color:#5b7da6;}
  .dots span{display:inline-block;width:9px;height:9px;margin:0 3px;border-radius:50%;background:#7fb6e6;animation:dot 1s infinite;}
  .dots span:nth-child(2){animation-delay:.2s;} .dots span:nth-child(3){animation-delay:.4s;}
  @keyframes dot{0%,100%{transform:translateY(0);opacity:.5;}50%{transform:translateY(-7px);opacity:1;}}

  .micwrap{z-index:4;display:flex;justify-content:center;padding:16px 0 4px;}
  .mic{width:94px;height:94px;border:none;border-radius:50%;cursor:pointer;color:#04122e;font-size:38px;
    background:radial-gradient(circle at 38% 30%,#ffe79a,#ffd24a 55%,#f3a93a);
    box-shadow:0 10px 0 #c9892b,0 0 0 10px rgba(255,210,74,.16),inset 0 4px 4px rgba(255,255,255,.6);
    transition:transform .1s ease;}
  .mic:active{transform:translateY(7px);}
  .mic.on{animation:micpulse 1.6s ease-in-out infinite;box-shadow:0 10px 0 #c9892b,0 0 0 14px rgba(95,208,168,.25),inset 0 4px 4px rgba(255,255,255,.6);}
  @keyframes micpulse{0%,100%{box-shadow:0 10px 0 #c9892b,0 0 0 12px rgba(95,208,168,.22),inset 0 4px 4px rgba(255,255,255,.6);}50%{box-shadow:0 10px 0 #c9892b,0 0 0 22px rgba(95,208,168,.05),inset 0 4px 4px rgba(255,255,255,.6);}}
  .hint{z-index:4;text-align:center;font-family:'Fredoka';font-weight:500;color:#bfe6ff;font-size:14px;padding:2px 16px 8px;min-height:22px;}

  .row{z-index:4;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:2px 16px calc(16px + env(safe-area-inset-bottom));}
  .b{font-family:'Fredoka';font-weight:700;font-size:17px;border:none;border-radius:26px;padding:15px 6px 13px;cursor:pointer;color:#062033;
    display:flex;flex-direction:column;align-items:center;gap:4px;line-height:1.1;
    background-image:linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,255,255,0) 45%,rgba(0,0,0,.16));
    box-shadow:0 8px 0 rgba(0,0,0,.22),inset 0 3px 2px rgba(255,255,255,.6);transition:transform .1s ease;}
  .b:active{transform:translateY(6px);box-shadow:0 2px 0 rgba(0,0,0,.22),inset 0 3px 2px rgba(255,255,255,.5);}
  .b .e{font-size:30px;line-height:1;}
  .b.why{background-color:#ffd24a;} .b.wow{background-color:#ff9ec4;} .b.next{background-color:#9ec7ff;}

  .confetti{position:absolute;z-index:9;width:11px;height:15px;border-radius:2px;top:38%;pointer-events:none;}

  .diag{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(6,18,38,.95);color:#cfe6ff;
    font-family:'Fredoka';font-size:12px;padding:8px 12px;display:none;cursor:pointer;border-top:1px solid rgba(120,180,255,.3);}
  .diag.show{display:block;}

  .modal{position:fixed;inset:0;z-index:40;background:rgba(4,14,34,.86);display:none;align-items:center;justify-content:center;padding:24px;}
  .modal.show{display:flex;}
  .card{background:#fff;border-radius:26px;padding:26px 22px;max-width:340px;width:100%;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.5);}
  .card h2{font-family:'Fredoka';font-weight:700;color:#0c2747;font-size:22px;margin-bottom:6px;}
  .card p{font-family:'Fredoka';font-weight:500;color:#5b7da6;font-size:15px;margin-bottom:16px;}
  .card input{width:100%;font-family:'Fredoka';font-size:20px;text-align:center;padding:12px;border:2px solid #cfe0f2;border-radius:16px;color:#0c2747;margin-bottom:14px;}
  .card button{font-family:'Fredoka';font-weight:700;font-size:18px;border:none;border-radius:18px;padding:13px 26px;cursor:pointer;color:#04243a;background:#4ac4e6;box-shadow:0 6px 0 #2f9bbd;}

  @media (max-height:680px){
    .jarvis{width:min(40vmin,170px);height:min(40vmin,170px);}
    .creature{width:min(56vw,250px);height:min(56vw,250px);}
    .bigemoji{font-size:min(36vw,160px);}
    .mic{width:80px;height:80px;font-size:32px;}
    .speech p{font-size:18px;}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;}}
</style>
</head>

      <path d="M104 150 Q120 166 136 150" stroke="#0c2747" stroke-width="6" fill="none" stroke-linecap="round"/>
    </svg>
    <div class="creature" id="creature"></div>
  </div>

  <div class="speech idle" id="speech"><p id="say"></p></div>
  <div class="micwrap"><button class="mic" id="mic" aria-label="Talk to Jarvis">🎤</button></div>
  <div class="hint" id="hint"></div>

  <div class="row">
    <button class="b why" onclick="onWhy()"><span class="e">❓</span><span id="lWhy">Why?</span></button>
    <button class="b wow" onclick="onWow()"><span class="e">😮</span><span id="lWow">Wow!</span></button>
    <button class="b next" onclick="onNext()"><span class="e">➡️</span><span id="lNext">Next</span></button>
  </div>

  <div class="diag" id="diag" onclick="this.classList.remove('show')"></div>

  <div class="modal" id="nameModal">
    <div class="card">
      <h2 id="nmTitle">สวัสดีจ้ะ!</h2>
      <p id="nmSub">หนูชื่ออะไรเอ่ย? (ให้คุณพ่อคุณแม่ช่วยพิมพ์)</p>
      <input id="nmInput" maxlength="20" placeholder="ชื่อหนู" />
      <button onclick="saveName()" id="nmBtn">เริ่มเล่น!</button>
    </div>
  </div>
</div>

/* ============ build the word matcher (longest word first; art wins ties) ============ */
var WORDS = (function(){
  var list=[];
  for(var k in ANIMALS){ var w=[k]; if(ANIMALS[k].th) w.push(ANIMALS[k].th); if(ART_SYN[k]) w=w.concat(ART_SYN[k]);
    for(var i=0;i<w.length;i++) list.push([(''+w[i]).toLowerCase(),k,'art',1]); }
  for(var e in EMOJI){ var arr=EMOJI[e][2].concat([e]);
    for(var j=0;j<arr.length;j++) list.push([(''+arr[j]).toLowerCase(),e,'emoji',0]); }
  list.sort(function(a,b){ if(b[0].length!==a[0].length) return b[0].length-a[0].length; return b[3]-a[3]; });
  return list;
})();
function matchAnimal(t){ t=' '+t.toLowerCase().replace(/[.,!?]/g,'')+' ';
  for(var i=0;i<WORDS.length;i++){ if(t.indexOf(WORDS[i][0])!==-1) return {key:WORDS[i][1],kind:WORDS[i][2]}; } return null; }
function matchReply(t){ var raw=t.toLowerCase().replace(/[.,!?]/g,''); var p=' '+raw+' ';
  for(var k in REPLY){ for(var i=0;i<REPLY[k].length;i++){ var w=(''+REPLY[k][i]).toLowerCase();
    if(/^[\x00-\x7F ]+$/.test(w)){ if(p.indexOf(' '+w+' ')!==-1) return k; } else { if(raw.indexOf(w)!==-1) return k; } } } return null; }

/* ============ speech (lively voice) + anti-feedback-loop ============ */
var jarvisSpeaking=false, muteUntil=0, speakWatchdog=null, curUtter=null;
function setTalking(on){ var c=$('creature'); if(c) c.classList.toggle('talking',!!on); }
function speak(text){
  try{
    if(!('speechSynthesis' in window)){ busy=false; return; }
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang=(lang==='th')?'th-TH':'en-US';
    u.rate=(lang==='th'?1.0:1.05)+(Math.random()*0.08-0.04);
    u.pitch=1.32+(Math.random()*0.22-0.11);
    var vs=window.speechSynthesis.getVoices()||[];
    var want=vs.filter(function(v){return v.lang&&v.lang.toLowerCase().indexOf(lang==='th'?'th':'en')===0;});
    if(want.length){ var nice=want.find(function(v){return /kanya|google|samantha|nicky|aaron/i.test(v.name);}); u.voice=nice||want[0]; }
    jarvisSpeaking=true; setTalking(true);
    if(speakWatchdog) clearTimeout(speakWatchdog);
    var est=Math.min(12000,2200+text.length*85);
    speakWatchdog=setTimeout(function(){ jarvisSpeaking=false; muteUntil=Date.now()+300; setTalking(false); busy=false; },est);
    u.onstart=function(){ jarvisSpeaking=true; setTalking(true); };
    u.onend=function(){ if(speakWatchdog)clearTimeout(speakWatchdog); jarvisSpeaking=false; muteUntil=Date.now()+1000; setTalking(false); busy=false; };
    u.onerror=function(){ if(speakWatchdog)clearTimeout(speakWatchdog); jarvisSpeaking=false; muteUntil=Date.now()+1000; setTalking(false); busy=false; };
    curUtter=u; window.speechSynthesis.speak(u);
  }catch(e){ jarvisSpeaking=false; setTalking(false); busy=false; }
}

/* ============ summon an animal ============ */
function summon(key,kind){
  busy=true; reqId++;
  var name, topic, danger=false, emoji='';
  if(kind==='art'){ var a=ANIMALS[key]; name=(lang==='th')?a.th:a.en; topic=a.topic; danger=!!a.danger; }
  else{ emoji=EMOJI[key][0]; name=(lang==='th')?EMOJI[key][1]:key; topic=name; }
  current={key:key,kind:kind,topic:topic,danger:danger,name:name,emoji:emoji};
  renderVisual(kind,key,emoji);
  setThinking();
  var safety = danger ? " At the very end add a tiny 3-word safety tag like 'Only look, okay!' — nothing more, never scary." : "";
  var prompt = "Tell one fun thing about "+topic+", in "+T[lang].langName+", for a 3 year old. ONE tiny sentence, max 10 words."+safety;
  convo=[]; callJarvis(prompt, danger);
}

/* ============ Jarvis brain (Netlify function) with offline fallback ============ */
function callJarvis(userText,danger){
  var myId=++reqId; setThinking();
  convo.push({role:'user',content:userText});
  if(convo.length>10) convo=convo.slice(-10);
  fetch("/.netlify/functions/jarvis",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({messages:convo,lang:lang})})
  .then(function(r){return r.text().then(function(raw){var d=null;try{d=JSON.parse(raw);}catch(e){}return {ok:r.ok,status:r.status,d:d,raw:raw};});})
  .then(function(res){
    if(myId!==reqId) return;
    var text=(res.d&&res.d.text)?String(res.d.text).trim():'';
    if(res.ok&&text){ convo.push({role:'assistant',content:text}); showSay(text); speak(text); return; }
    offline(); 
    showDiag('Server: '+((res.d&&res.d.error)||('status '+res.status)));
  })
  .catch(function(){ if(myId!==reqId) return; offline(); });
}
function offline(){
  busy=false;
  var line='';
  if(current){
    if(current.kind==='art'){ line=(lang==='th')?ANIMALS[current.key].fillTh:ANIMALS[current.key].fillEn; }
    else { line=current.emoji+' '+current.name+'!'; }
  }
  if(!line) line=T[lang].oops;
  showSay(line); speak(line);
}

/* ============ buttons ============ */
function onWhy(){ if(busy||!current) return; busy=true;
  callJarvis("Why? Answer in "+T[lang].langName+", one tiny sentence, max 10 words.", current.danger); }
function onWow(){ var w=pick(T[lang].wows); showSay(w); speak(w); confetti(); }
function onNext(){ if(busy) return; var k=pick(ART_KEYS); summon(k,'art'); }
function moreFact(){ if(busy||!current) return; busy=true;
  callJarvis("Tell another tiny fun fact about "+current.topic+", in "+T[lang].langName+", max 10 words.", current.danger); }

/* ============ route what the child says ============ */
function routeSpeech(said){
  var a=matchAnimal(said); if(a){ summon(a.key,a.kind); return; }
  var r=matchReply(said);
  if(r==='next'){ onNext(); return; }
  if(r==='why'){ onWhy(); return; }
  if(r==='wow'){ onWow(); return; }
  if(r==='more'){ moreFact(); return; }
  if(r==='no'){ var ok=(lang==='th')?'ได้จ้ะ!':'Okay!'; showSay(ok); speak(ok); return; }
  if(current){ moreFact(); return; }            // talking about something -> keep going
  // nothing matched and nothing on stage
  showSay(T[lang].dontknow); speak(T[lang].dontknow);
}
function handleHeard(said){
  if(!said) return;
  if(jarvisSpeaking || Date.now()<muteUntil) return;
  if(!greeted){ greeted=true; }
  routeSpeech(said);
}

/* ============ microphone ============ */
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
var USE_TAPTALK=(function(){var ua=navigator.userAgent||'';return /iPad|iPhone|iPod/.test(ua)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);})();
var recog=null, micOn=false;
function startRecog(oneShot){
  if(!SR){ flashHint(T[lang].nomic); return; }
  try{ if(recog){ recog.onend=null; recog.abort(); } }catch(e){}
  recog=new SR();
  recog.lang=(lang==='th')?'th-TH':'en-US';
  recog.continuous=!oneShot; recog.interimResults=false;
  recog.onresult=function(ev){
    var said=''; for(var i=ev.resultIndex;i<ev.results.length;i++){ if(ev.results[i].isFinal) said+=ev.results[i][0].transcript; }
    said=said.trim(); if(!said) return;
    showDiag('Heard: "'+said+'"'); handleHeard(said);
  };
  recog.onerror=function(e){ showDiag('Mic: '+e.error); if(e.error==='not-allowed'||e.error==='service-not-allowed'){ micOn=false; setMic(); } };
  recog.onend=function(){ if(oneShot){ micOn=false; setMic(); return; } if(micOn){ setTimeout(function(){ try{recog.start();}catch(e){} },300); } };
  try{ recog.start(); }catch(e){}
}
function setMic(){ $('mic').classList.toggle('on',micOn); $('hint').textContent = micOn?T[lang].listening:T[lang].tapHint; }
function micClick(){
  if(!greeted){ greeted=true; var g=T[lang].greet(childName); showSay(g); speak(g); }
  if(USE_TAPTALK){ micOn=true; setMic(); startRecog(true); return; }
  micOn=!micOn; setMic(); if(micOn) startRecog(false); else { try{ if(recog){recog.onend=null;recog.abort();} }catch(e){} }
}

/* ============ confetti ============ */
function confetti(){ var cols=['#ffd24a','#ff9ec4','#5fd0a8','#9ec7ff','#ff8f7a'], host=$('app');
  for(var k=0;k<18;k++){ (function(i){ var d=document.createElement('div'); d.className='confetti';
    d.style.left=(20+Math.random()*60)+'%'; d.style.background=cols[i%cols.length]; host.appendChild(d);
    var dx=(Math.random()*180-90),dy=(240+Math.random()*180),rot=(Math.random()*540-270);
    d.animate([{transform:'rotate(0)',opacity:1},{transform:'translate('+dx+'px,'+dy+'px) rotate('+rot+'deg)',opacity:0}],
      {duration:1100+Math.random()*500,easing:'cubic-bezier(.2,.6,.3,1)'}).onfinish=function(){d.remove();}; })(k); } }

/* ============ diagnostics ============ */
function showDiag(msg){ var d=$('diag'); d.textContent='🔧 '+msg+'  (tap to close)'; d.classList.add('show'); }

/* ============ bubbles ============ */
(function(){ var host=$('app'); for(var b=0;b<16;b++){ var s=6+Math.random()*16, el=document.createElement('div'); el.className='bubble';
  el.style.width=s+'px'; el.style.height=s+'px'; el.style.left=(Math.random()*100)+'%';
  el.style.animationDuration=(7+Math.random()*8)+'s'; el.style.animationDelay=(-Math.random()*10)+'s'; host.appendChild(el); } })();

/* ============ init ============ */
$('mic').addEventListener('click',micClick);
childName=loadName();
setLang('th');
showIdle();
if(!childName){ $('nameModal').classList.add('show'); }
if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged=function(){}; }
</script>
